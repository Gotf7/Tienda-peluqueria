<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy Hair | {{linea.nombre}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    
    <style>
        :root {
            --beauty-cream: #fdfbf7;
            --beauty-deep: #1a1a1a;
            --beauty-gold: #d4af37;
            --accent-pink: #f8edeb;
        }

        body { 
            background-color: var(--beauty-cream); 
            color: var(--beauty-deep);
            font-family: 'Poppins', sans-serif;
        }

        .product-header {
            text-align: center;
            padding: 60px 20px;
            background: #ffffff;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .linea-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.2rem;
            color: var(--beauty-gold);
            margin-bottom: 15px;
        }

        /* Tarjetas de Botes Individuales Minimalistas */
        .product-item {
            background-color: #ffffff;
            border-radius: 15px; 
            border: none; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 100%;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .product-item:hover { 
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            border-color: var(--beauty-gold);
        }

        .img-box {
            background-color: var(--accent-pink); /* Fondo suave para que el bote resalte */
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .product-img {
            max-height: 100%;
            width: auto;
            transition: 0.6s;
        }

        .product-item:hover .product-img { transform: scale(1.08); }

        .product-item-body { padding: 20px 15px; }

        .product-title {
            font-weight: 400;
            font-size: 0.95rem;
            color: var(--beauty-deep);
            margin-bottom: 10px;
            min-height: 40px;
            line-height: 1.2;
        }

        .precio-tag { 
            color: var(--beauty-gold); 
            font-weight: 700; 
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: block;
        }

        .btn-view { 
            background: transparent;
            border: 1px solid var(--beauty-deep);
            color: var(--beauty-deep); 
            font-weight: 600; 
            border-radius: 0;
            padding: 10px;
            transition: 0.3s;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn-view:hover {
            background: var(--beauty-deep);
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-light">
    
    <div class="product-header" data-aos="fade-down">
        <a href="/" class="text-dark text-decoration-none small mb-3 d-inline-block">← Volver a Líneas</a>
        <h2 class="linea-title">{{linea.nombre}}</h2>
        <p class="text-muted small mx-auto" style="max-width: 500px;">Explore el cuidado individual que tu cabello merece</p>
    </div>

    <div class="container">
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4" id="gallery">
            {% for item in items %}
            <div class="col item-box" data-aos="zoom-in">
                <div class="card product-item h-100 shadow-lg">
                    <div class="img-box">
                        <img src="/static/{{item.img}}" class="product-img">
                    </div>
                    <div class="product-item-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <h6 class="product-title">{{item.nombre}}</h6>
                            <span class="precio-tag">{{item.precio}}</span>
                        </div>
                        <a href="/producto/{{item.id}}" class="btn btn-view w-100 py-2">
                            Ver Detalles Pro
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
